<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliterador Árabe a Español</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f9f9f9; color: #333; }
        h1 { text-align: center; font-size: 1.5rem; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #resultado { background: white; padding: 15px; min-height: 60px; border-radius: 8px; border: 1px solid #ddd; white-space: pre-wrap; font-size: 16px; line-height: 1.6; }
        .error { color: #dc2626; background: #fef2f2; padding: 10px; border-radius: 6px; border-left: 4px solid #dc2626; }
        .info { background: #eff6ff; padding: 10px; border-radius: 6px; border-left: 4px solid #3b82f6; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🌙 Transliterador Árabe</h1>
    
    <div class="info">
        <strong>💡 Modelo:</strong> openrouter/owl-alpha
    </div>
    
    <input type="password" id="apiKey" placeholder="Pega aquí tu API Key de OpenRouter (sk-or-...)">
    <textarea id="textoArabe" rows="4" placeholder="Escribe o pega el texto en árabe aquí..."></textarea>
    <button onclick="transliterar()">Transliterar</button>
    
    <h3>Resultado:</h3>
    <div id="resultado">Esperando texto...</div>

    <script>
        async function transliterar() {
            const apiKey = document.getElementById('apiKey').value;
            const textoArabe = document.getElementById('textoArabe').value;
            const resultadoDiv = document.getElementById('resultado');

            if (!apiKey || !textoArabe) {
                resultadoDiv.innerHTML = '<div class="error">Por favor, ingresa tu API Key y el texto en árabe.</div>';
                return;
            }

            resultadoDiv.innerText = "Procesando...";

            const systemPrompt = `Actúa como un experto en fonética árabe para hispanohablantes. Translitera el texto árabe que te daré usando estrictamente sonidos del español para que suene natural al leerlo en voz alta.

Reglas de oro:
1. Sonidos especiales: ش="sh", خ="j" fuerte, ح="j" muy suave (aspirada), ع= pausa en la garganta (marca con '), غ="r" gutural, ق="k" profunda.
2. Consonantes énfaticas (ص, ض, ط, ظ): Usa letras dobles (tt, ss, dd) para que el lector sepa que debe pronunciarlas con más fuerza y profundidad.
3. Vocales: Cortas (a, i, u). Largas: duplícalas (aa, ii, uu).
4. Formato: Divide en fragmentos (Árabe | Pronunciación). Marca la sílaba tónica en **negrita**.
5. Al final, escribe la "Pronunciación corrida" con el ritmo natural y el significado en español.`;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'Transliterador Árabe'
                    },
                    body: JSON.stringify({
                        model: 'openrouter/owl-alpha',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: `Texto en árabe a transliterar: "${textoArabe}"` }
                        ],
                        temperature: 0.2,
                        max_tokens: 4096,
                        top_p: 0.95
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `Error HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    resultadoDiv.innerText = data.choices[0].message.content;
                } else {
                    throw new Error('Respuesta vacía de la API');
                }
                
            } catch (error) {
                console.error('Error:', error);
                
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    resultadoDiv.innerHTML = `
                        <div class="error">
                            <strong>❌ Error de conexión o CORS</strong><br><br>
                            <strong>Solución:</strong> Guarda el archivo en tu computadora y ábrelo con doble clic. No lo ejecutes desde un servidor web externo.
                        </div>
                    `;
                } else if (error.message.includes('401') || error.message.includes('invalid_api_key')) {
                    resultadoDiv.innerHTML = `
                        <div class="error">
                            <strong>❌ API Key inválida</strong><br><br>
                            Verifica que tu clave empiece con <code>sk-or-</code>.
                        </div>
                    `;
                } else if (error.message.includes('not found') || error.message.includes('model')) {
                    resultadoDiv.innerHTML = `
                        <div class="error">
                            <strong>❌ Modelo no encontrado</strong><br><br>
                            El modelo <code>openrouter/owl-alpha</code> no está disponible. Revisa el nombre exacto en OpenRouter.
                        </div>
                    `;
                } else {
                    resultadoDiv.innerHTML = `<div class="error"><strong>Error:</strong> ${error.message}</div>`;
                }
            }
        }
    </script>
</body>
</html>
