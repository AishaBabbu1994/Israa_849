<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliteración Árabe Completa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9fbfd; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a5276; }
        .boxes { display: flex; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .box { flex: 1; min-width: 300px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #e0e6ed; border-radius: 10px; font-size: 20px; box-sizing: border-box; resize: vertical; }
        #arabicInput { font-family: 'Traditional Arabic', Arial, sans-serif; font-size: 28px; direction: rtl; text-align: right; }
        #latinOutput { font-family: 'Courier New', monospace; background: #f8f9fa; }
        .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 600; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-blue { background: #2980b9; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #c0392b; }
        .btn-purple { background: #8e44ad; }
        .status { text-align: center; margin-top: 20px; color: #7f8c8d; font-style: italic; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h1>️ Transliteración Árabe Completa</h1>
    
    <div class="boxes">
        <div class="box">
            <label for="arabicInput">Texto Árabe (con diacríticos):</label>
            <textarea id="arabicInput" placeholder="أُكْتُبُ فِي الدَّفْتَرِ"></textarea>
        </div>
        <div class="box">
            <label for="latinOutput">Transliteración:</label>
            <textarea id="latinOutput" readonly placeholder="ạuk̊tub̊ fī ạldãf̊tari"></textarea>
        </div>
    </div>

    <div class="btns">
        <button class="btn-blue" onclick="transliterate()"> Transliterar</button>
        <button class="btn-green" onclick="addDiacriticsBasic()">➕ Añadir Diacríticos</button>
        <button class="btn-red" onclick="removeDiacritics()">➖ Quitar Diacríticos</button>
        <button class="btn-purple" id="btnListen" onclick="listen()" disabled>🔊 Escuchar</button>
    </div>
    
    <div class="status" id="status"></div>
</div>

<script>
// Mapeo completo de caracteres árabes a transliteración
const charMap = {
    // Consonantes básicas
    'ب': 'b', 'ت': 't', 'ث': 'ṯ', 'ج': 'j', 'ح': 'ḥ', 'خ': 'ḫ',
    'د': 'd', 'ذ': 'ḏ', 'ر': 'r', 'ز': 'z', 'س': 's', 'ش': 'š',
    'ص': 'ṣ', 'ض': 'ḍ', 'ط': 'ṭ', 'ظ': 'ẓ', 'ع': 'ʿ', 'غ': 'ġ',
    'ف': 'f', 'ق': 'q', 'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n',
    'ه': 'h', 'و': 'w', 'ي': 'y',
    
    // Alif y variantes
    'ا': 'ā', 'أ': 'ʾa', 'إ': 'ʾi', 'آ': 'ʾā', 'ؤ': 'ʾu', 'ئ': 'ʾi', 'ء': 'ʾ',
    
    // Ta marbuta y alif maqsura
    'ة': 'ah', 'ى': 'ā',
    
    // Vocales cortas
    'َ': 'a', 'ُ': 'u', 'ِ': 'i',
    
    // Vocales largas (cuando no tienen diacrítico)
    'َا': 'ā', 'ُو': 'ū', 'ِي': 'ī',
    
    // Tanween
    'ً': 'an', 'ٌ': 'un', 'ٍ': 'in',
    
    // Sukun (sin vocal)
    'ْ': '',
    
    // Shadda (duplica consonante)
    'ّ': '',
    
    // Espacios y puntuación
    ' ': ' ', '\n': '\n', ',': ',', '.': '.', '?': '?', '!': '!', '-': '-'
};

// Consonantes empháticas (que llevan punto debajo en la transliteración)
const emphatics = new Set(['ط', 'ظ', 'ص', 'ض', 'ق']);

function transliterate() {
    const input = document.getElementById('arabicInput').value;
    if (!input.trim()) {
        showStatus('Ingresa texto árabe primero');
        return;
    }

    let output = '';
    let prevChar = '';
    let i = 0;
    
    while (i < input.length) {
        const char = input[i];
        const nextChar = input[i + 1] || '';
        
        // Manejar shadda (duplica la consonante anterior)
        if (char === 'ّ') {
            if (prevChar && charMap[prevChar] && !isVowel(prevChar)) {
                output += charMap[prevChar] || prevChar;
            }
            i++;
            continue;
        }
        
        // Secuencias especiales: alif + fatha = ā
        if (char === 'ا' && nextChar === 'َ') {
            output += 'ā';
            i += 2;
            prevChar = 'ا';
            continue;
        }
        
        // Waw + damma = ū
        if (char === 'و' && nextChar === 'ُ') {
            output += 'ū';
            i += 2;
            prevChar = 'و';
            continue;
        }
        
        // Ya + kasra = ī
        if (char === 'ي' && nextChar === 'ِ') {
            output += 'ī';
            i += 2;
            prevChar = 'ي';
            continue;
        }
        
        // Alif sin diacrítico después de fatha = ā
        if (char === 'ا' && prevChar !== 'ْ') {
            const prevCode = prevChar.charCodeAt(0);
            if (prevCode >= 0x064B && prevCode <= 0x0652) {
                // Alif después de diacrítico
            }
            output += 'ā';
            i++;
            prevChar = 'ا';
            continue;
        }
        
        // Procesar carácter normal
        if (charMap[char] !== undefined) {
            let translit = charMap[char];
            
            // Añadir punto debajo para consonantes empháticas
            if (emphatics.has(char)) {
                translit = translit + '̣'; // punto debajo combinado
            }
            
            output += translit;
            prevChar = char;
        } else {
            // Mantener caracteres desconocidos
            output += char;
        }
        
        i++;
    }
    
    // Limpieza final: remover duplicados y ajustar
    output = output.replace(/aa/g, 'ā')
                   .replace(/ii/g, 'ī')
                   .replace(/uu/g, 'ū')
                   .replace(/([^aāiīuū])a([^aāiīuū]|$)/g, '$1a$2');
    
    document.getElementById('latinOutput').value = output;
    showStatus('✓ Transliteración completada');
}

function isVowel(char) {
    return ['َ', 'ُ', 'ِ', 'ً', 'ٌ', 'ٍ', 'ا', 'و', 'ي'].includes(char);
}

function addDiacriticsBasic() {
    const input = document.getElementById('arabicInput').value;
    if (!input.trim()) return;
    
    let output = '';
    for (let i = 0; i < input.length; i++) {
        const char = input[i];
        const code = char.charCodeAt(0);
        
        // Si es consonante árabe y no tiene diacrítico después
        if (code >= 0x0628 && code <= 0x064A && code !== 0x0648 && code !== 0x064A && code !== 0x0627) {
            const next = input[i + 1];
            if (!next || next.charCodeAt(0) < 0x064B || next.charCodeAt(0) > 0x0652) {
                output += char + 'َ'; // Añadir fatha
            } else {
                output += char;
            }
        } else {
            output += char;
        }
    }
    
    document.getElementById('arabicInput').value = output;
    showStatus('✓ Diacríticos básicos añadidos');
}

function removeDiacritics() {
    const input = document.getElementById('arabicInput').value;
    document.getElementById('arabicInput').value = input.replace(/[\u064B-\u0652]/g, '');
    document.getElementById('latinOutput').value = '';
    showStatus('✓ Diacríticos eliminados');
}

// Sistema de audio mejorado
let voices = [];
let arabicVoice = null;

function loadVoices() {
    if ('speechSynthesis' in window) {
        voices = speechSynthesis.getVoices();
        // Buscar voz árabe
        arabicVoice = voices.find(v => v.lang === 'ar-SA') || 
                      voices.find(v => v.lang.startsWith('ar'));
        
        const btn = document.getElementById('btnListen');
        if (arabicVoice) {
            btn.disabled = false;
            btn.textContent = '🔊 Escuchar';
        } else {
            btn.disabled = false;
            btn.textContent = '🔊 Escuchar (voz del sistema)';
        }
    }
}

function listen() {
    const text = document.getElementById('arabicInput').value;
    if (!text.trim()) {
        showStatus('Ingresa texto para escuchar');
        return;
    }

    if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        
        if (arabicVoice) {
            utterance.voice = arabicVoice;
        }
        utterance.lang = 'ar-SA';
        utterance.rate = 0.8;
        utterance.pitch = 1.0;
        
        utterance.onstart = () => showStatus('🔊 Reproduciendo...');
        utterance.onend = () => showStatus('');
        utterance.onerror = (e) => {
            console.error('Error de audio:', e);
            showStatus('⚠️ Error: Instala una voz árabe en tu sistema');
        };
        
        speechSynthesis.speak(utterance);
    } else {
        showStatus('⚠️ Tu navegador no soporta audio');
    }
}

function showStatus(msg) {
    const status = document.getElementById('status');
    status.textContent = msg;
    if (msg) setTimeout(() => { if (status.textContent === msg) status.textContent = ''; }, 4000);
}

// Cargar voces al iniciar
if ('speechSynthesis' in window) {
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
    setTimeout(loadVoices, 500);
}

// Ejemplo al cargar
window.addEventListener('load', () => {
    document.getElementById('arabicInput').value = 'أُكْتُبُ فِي الدَّفْتَرِ';
    showStatus('Ejemplo cargado. Presiona "Transliterar"');
});
</script>
</body>
</html>
