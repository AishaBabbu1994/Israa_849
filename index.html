<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramienta de Transliteración Árabe</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9fbfd; color: #2c3e50; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1000px; width: 100%; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); margin-top: 20px; }
        h1 { text-align: center; color: #1a5276; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #5d6d7e; margin-bottom: 40px; }
        .text-area-container { display: flex; gap: 25px; margin-bottom: 30px; flex-wrap: wrap; }
        .text-box { flex: 1; min-width: 320px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 10px; }
        textarea { width: 100%; height: 250px; padding: 18px; border: 2px solid #e0e6ed; border-radius: 12px; font-size: 18px; resize: vertical; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: #3498db; }
        #arabicInput { font-family: 'Traditional Arabic', Arial, sans-serif; font-size: 26px; direction: rtl; text-align: right; line-height: 1.8; }
        #latinOutput { font-family: 'Georgia', serif; font-size: 20px; background: #fcfcfc; }
        .buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        button { padding: 14px 28px; font-size: 16px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; color: #fff; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .btn-transliterate { background: #2980b9; }
        .btn-diacritics { background: #27ae60; }
        .btn-remove { background: #c0392b; }
        .btn-listen { background: #8e44ad; }
        .status { text-align: center; margin-top: 25px; font-style: italic; color: #7f8c8d; min-height: 24px; }
        .note { margin-top: 40px; padding: 20px; background: #eaf2f8; border-left: 5px solid #2980b9; border-radius: 8px; font-size: 0.95em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Herramienta de Transliteración Árabe</h1>
    <p class="subtitle">Convierte texto árabe a script latino y escucha la pronunciación.</p>
    
    <div class="text-area-container">
        <div class="text-box">
            <label for="arabicInput">Texto Árabe</label>
            <textarea id="arabicInput" placeholder="اكتب أو الصق النص العربي هنا..."></textarea>
        </div>
        <div class="text-box">
            <label for="latinOutput">Transliteración Latina</label>
            <textarea id="latinOutput" placeholder="El texto transliterado aparecerá aquí..." readonly></textarea>
        </div>
    </div>

    <div class="buttons">
        <button class="btn-transliterate" onclick="transliterate()">Transliterar</button>
        <button class="btn-diacritics" onclick="addDiacritics()">Añadir Diacríticos</button>
        <button class="btn-remove" onclick="removeDiacritics()">Eliminar Diacríticos</button>
        <button class="btn-listen" onclick="listen()">🔊 Escuchar</button>
    </div>
    
    <div class="status" id="status"></div>

    <div class="note">
        <strong>Nota:</strong> El audio usa la voz nativa de tu dispositivo. Si no escuchas nada, verifica que tu sistema operativo tenga instalada una voz en árabe.
    </div>
</div>

<script>
    // Cargar voces al inicio
    if ('speechSynthesis' in window) {
        speechSynthesis.getVoices();
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    const transliterationMap = {
        'ا': 'ā', 'ب': 'b', 'ت': 't', 'ث': 'th', 'ج': 'j', 'ح': '', 'خ': 'kh',
        'د': 'd', 'ذ': 'dh', 'ر': 'r', 'ز': 'z', 'س': 's', 'ش': 'sh', 'ص': 'ṣ',
        'ض': 'ḍ', 'ط': 'ṭ', 'ظ': 'ẓ', 'ع': 'ʿ', 'غ': 'gh', 'ف': 'f', 'ق': 'q',
        'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n', 'ه': 'h', 'و': 'w', 'ي': 'y',
        'ء': '', 'آ': 'ʾā', 'أ': 'ʾa', 'إ': 'ʾi', 'ؤ': 'ʾu', 'ئ': 'ʾi',
        'ة': 'ah', 'ى': 'ā',
        'َ': 'a', 'ُ': 'u', 'ِ': 'i', 'ً': 'an', 'ٌ': 'un', 'ٍ': 'in',
        'ّ': '', 'ْ': '', ' ': ' ', '\n': '\n'
    };

    function transliterate() {
        const input = document.getElementById('arabicInput').value;
        if (!input.trim()) { showStatus('Introduce texto árabe primero.'); return; }
        let output = '';
        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            if (transliterationMap[char] !== undefined) {
                if (char === 'ّ' && output.length > 0) output += output.slice(-1);
                else output += transliterationMap[char];
            } else { output += char; }
        }
        document.getElementById('latinOutput').value = output;
        showStatus('¡Transliteración completada!');
    }

    function removeDiacritics() {
        const input = document.getElementById('arabicInput').value;
        if (!input.trim()) { showStatus('Introduce texto árabe primero.'); return; }
        document.getElementById('arabicInput').value = input.replace(/[\u064B-\u0652]/g, '');
        showStatus('¡Diacríticos eliminados!');
    }

    function addDiacritics() {
        const input = document.getElementById('arabicInput').value;
        if (!input.trim()) { showStatus('Introduce texto árabe primero.'); return; }
        let output = '';
        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const code = char.charCodeAt(0);
            const isConsonant = (code >= 0x0628 && code <= 0x064A) && code !== 0x0648 && code !== 0x064A;
            if (isConsonant && (i === input.length - 1 || char.charCodeAt(0) < 0x064B || char.charCodeAt(0) > 0x0652)) {
                output += char + 'َ';
            } else { output += char; }
        }
        document.getElementById('arabicInput').value = output;
        showStatus('¡Diacríticos básicos añadidos!');
    }

    function listen() {
        const text = document.getElementById('arabicInput').value;
        if (!text.trim()) { showStatus('Introduce texto para escuchar.'); return; }

        if ('speechSynthesis' in window) {
            speechSynthesis.cancel(); // Detener audio anterior
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;

            // Buscar voz árabe específica
            const voices = speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.startsWith('ar'));
            if (arabicVoice) utterance.voice = arabicVoice;

            utterance.onstart = () => showStatus('Reproduciendo...');
            utterance.onend = () => showStatus('');
            utterance.onerror = () => showStatus('Error: Tu navegador no tiene voz árabe instalada.');

            speechSynthesis.speak(utterance);
        } else {
            showStatus('Tu navegador no soporta audio.');
        }
    }

    function showStatus(msg) {
        const status = document.getElementById('status');
        status.textContent = msg;
        if(msg) setTimeout(() => { if (status.textContent === msg) status.textContent = ''; }, 4000);
    }
</script>
</body>
</html>
