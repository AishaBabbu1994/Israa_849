<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cliente Groq para GitHub Pages</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b0c10;
      color: #c5c6c7;
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #45a29e;
      background: #1f2833;
      color: #c5c6c7;
    }
    button {
      background: #45a29e;
      color: #0b0c10;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      background: #1f2833;
      padding: 15px;
      border-radius: 6px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Cliente Groq (compatible con GitHub Pages)</h2>

  <label>API Key de Groq</label>
  <input type="password" id="apiKey" placeholder="Pega tu API key aquí">

  <label>URL del Proxy (Webhook.site)</label>
  <input type="text" id="proxyUrl" placeholder="Pega aquí tu URL de Webhook.site">

  <label>Mensaje</label>
  <textarea id="prompt" rows="4" placeholder="Escribe tu mensaje..."></textarea>

  <button id="sendBtn">Enviar</button>

  <h3>Respuesta</h3>
  <pre id="response">Esperando mensaje...</pre>

<script>
document.getElementById("sendBtn").addEventListener("click", async () => {
  const apiKey = document.getElementById("apiKey").value.trim();
  const proxyUrl = document.getElementById("proxyUrl").value.trim();
  const prompt = document.getElementById("prompt").value.trim();
  const responseBox = document.getElementById("response");

  if (!apiKey || !proxyUrl || !prompt) {
    alert("Falta algún dato: API key, proxy o mensaje.");
    return;
  }

  responseBox.textContent = "Consultando a Groq...";

  const payload = {
    url: "https://api.groq.com/openai/v1/chat/completions",
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    },
    body: {
      model: "groq/compound",
      messages: [{ role: "user", content: prompt }]
    }
  };

  try {
    const res = await fetch(proxyUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    const content = data?.choices?.[0]?.message?.content || "Sin contenido.";
    responseBox.textContent = content;

  } catch (err) {
    responseBox.textContent = "Error: " + err;
  }
});
</script>

</body>
</html>
