<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliterador Árabe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 900px; width: 100%; padding: 40px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1em; }
        .input-section { margin-bottom: 30px; }
        .input-section label { display: block; color: #333; font-weight: 600; margin-bottom: 10px; font-size: 1.1em; }
        textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1.1em; resize: vertical; min-height: 120px; direction: rtl; }
        textarea:focus { outline: none; border-color: #667eea; }
        .button-group { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        button { padding: 12px 30px; font-size: 1.05em; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-translate { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; flex: 1; min-width: 200px; }
        .btn-clear { background: #f0f0f0; color: #333; min-width: 120px; }
        .btn-copy { background: #4caf50; color: white; min-width: 120px; }
        .output-box { background: #f5f5f5; padding: 20px; border-radius: 8px; border: 2px solid #e0e0e0; min-height: 80px; font-size: 1.3em; color: #d84315; font-weight: bold; }
        .pronunciation-guide { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .pronunciation-guide p { color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔤 Transliterador Árabe</h1>
            <p>Convierte texto árabe a pronunciación clara</p>
        </div>

        <div class="input-section">
            <label for="arabicInput">Ingresa el Texto Árabe:</label>
            <textarea id="arabicInput" placeholder="أدخل النص العربي هنا..."></textarea>
        </div>

        <div class="button-group">
            <button class="btn-translate" onclick="window.translateText()">Traducir</button>
            <button class="btn-copy" onclick="window.copyOutput()">Copiar</button>
            <button class="btn-clear" onclick="window.clearAll()">Limpiar</button>
        </div>

        <div class="output-section">
            <label>📢 Resultado:</label>
            <div class="output-box" id="hispanicOutput">La pronunciación aparecerá aquí</div>

            <div class="pronunciation-guide">
                <h4>Guía rápida:</h4>
                <p><strong>h</strong> = aspirada suave | <strong>kh</strong> = jota fuerte</p>
                <p><strong>sh</strong> = ch | <strong>gh</strong> = g suave | <strong>dh</strong> = d suave</p>
            </div>
        </div>
    </div>

    <script>
        const PRONUNCIACION = {
            'ب': 'b', 'ت': 't', 'ث': 'z', 'ج': 'y', 'ح': 'h',
            'خ': 'kh', 'د': 'd', 'ذ': 'dh', 'ر': 'r', 'ز': 'z',
            'س': 's', 'ش': 'sh', 'ص': 's', 'ض': 'd', 'ط': 't',
            'ظ': 'z', 'ع': 'e', 'غ': 'gh', 'ف': 'f', 'ق': 'q',
            'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n', 'ه': 'h',
            'و': 'u', 'ي': 'i',
            'ا': 'a', 'أ': 'a', 'إ': 'i', 'آ': 'aa', 'ى': 'a',
            'ة': 'a', 'ء': '',
            'َ': 'a', 'ُ': 'u', 'ِ': 'i', 'ً': '', 'ٌ': '', 'ٍ': '', 'ّ': '', 'ْ': '',
            ' ': ' '
        };

        function limpiarDiacriticos(texto) {
            return texto.replace(/[\u064B-\u065F\u0670\u0640]/g, '');
        }

        function traducir(texto) {
            texto = limpiarDiacriticos(texto);
            let resultado = '';
            for (let i = 0; i < texto.length; i++) {
                const char = texto[i];
                const trad = PRONUNCIACION[char];
                if (trad !== undefined) {
                    if (trad === ' ' && resultado.slice(-1) === ' ') continue;
                    resultado += trad;
                }
            }
            return resultado.replace(/ +/g, ' ').trim();
        }

        window.translateText = function() {
            const input = document.getElementById('arabicInput').value;
            const outputDiv = document.getElementById('hispanicOutput');
            if (!input.trim()) {
                outputDiv.innerText = 'Ingresa texto árabe';
                return;
            }
            outputDiv.innerText = traducir(input);
        };

        window.copyOutput = function() {
            const text = document.getElementById('hispanicOutput').innerText;
            navigator.clipboard.writeText(text).then(() => alert('¡Copiado!'));
        };

        window.clearAll = function() {
            document.getElementById('arabicInput').value = '';
            document.getElementById('hispanicOutput').innerText = 'La pronunciación aparecerá aquí';
        };
    </script>
</body>
</html>
