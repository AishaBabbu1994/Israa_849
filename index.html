<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliterador Árabe a Español</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f9f9f9; color: #333; }
        h1 { text-align: center; font-size: 1.5rem; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #resultado { background: white; padding: 15px; min-height: 60px; border-radius: 8px; border: 1px solid #ddd; white-space: pre-wrap; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Transliterador Árabe</h1>
    
    <input type="password" id="apiKey" placeholder="Pega aquí tu API Key de Groq">
    <textarea id="textoArabe" rows="4" placeholder="Escribe o pega el texto en árabe aquí..."></textarea>
    <button onclick="transliterar()">Transliterar</button>
    
    <h3>Resultado:</h3>
    <div id="resultado">Esperando texto...</div>

    <script>
        async function transliterar() {
            const apiKey = document.getElementById('apiKey').value;
            const textoArabe = document.getElementById('textoArabe').value;
            const resultadoDiv = document.getElementById('resultado');

            if (!apiKey || !textoArabe) {
                resultadoDiv.innerText = "Por favor, ingresa tu API Key y el texto en árabe.";
                return;
            }

            resultadoDiv.innerText = "Procesando...";

            const systemPrompt = `Actúa como un experto en traducción y fonética del idioma árabe para hispanohablantes. Tu tarea es transliterar el texto en árabe que te proporcionaré al alfabeto español. 

Debes seguir estrictamente las siguientes reglas de estilo y pronunciación:
1. No utilices caracteres especiales, símbolos lingüísticos avanzados ni apóstrofes complejos (como ʿ o ʾ).
2. Translitera los sonidos basándote puramente en cómo los leería un hispanohablante de forma natural.
3. Utiliza la "j" para representar el sonido de la "H" aspirada o la "J" suave árabe (ejemplo: "aljeyr" o "Sabahj").
4. Representa los sonidos acentuados o alargados con tildes comunes en español si es necesario para marcar la entonación (ejemplo: "Asálamu").
5. Mantén las uniones de palabras o artículos de forma limpia y legible (ejemplo: "aljeyr", "asálamu").`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'groq/compound',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: `Texto en árabe a transliterar: "${textoArabe}"` }
                        ],
                        temperature: 0.2
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    resultadoDiv.innerText = data.choices[0].message.content;
                } else {
                    resultadoDiv.innerText = "Error: " + (data.error?.message || "Revisa tu API Key.");
                }
            } catch (error) {
                resultadoDiv.innerText = "Error de conexión. Verifica tu internet o tu API Key.";
            }
        }
    </script>
</body>
</html>
