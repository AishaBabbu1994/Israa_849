<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliteración Árabe</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9fbfd; color: #2c3e50; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1000px; width: 100%; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); margin-top: 20px; }
        h1 { text-align: center; color: #1a5276; margin-bottom: 10px; }
        .text-area-container { display: flex; gap: 25px; margin-bottom: 30px; flex-wrap: wrap; }
        .text-box { flex: 1; min-width: 320px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 10px; }
        textarea { width: 100%; height: 200px; padding: 18px; border: 2px solid #e0e6ed; border-radius: 12px; font-size: 18px; resize: vertical; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: #3498db; }
        #arabicInput { font-family: 'Traditional Arabic', Arial, sans-serif; font-size: 26px; direction: rtl; text-align: right; }
        #latinOutput { font-family: 'Georgia', serif; font-size: 20px; background: #fcfcfc; }
        .buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        button { padding: 12px 24px; font-size: 16px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; color: #fff; }
        button:hover { opacity: 0.9; }
        .btn-transliterate { background: #2980b9; }
        .btn-remove { background: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Transliteración Árabe</h1>
    <div class="text-area-container">
        <div class="text-box">
            <label for="arabicInput">Texto Árabe</label>
            <textarea id="arabicInput" placeholder="اكتب هنا..."></textarea>
        </div>
        <div class="text-box">
            <label for="latinOutput">Transliteración</label>
            <textarea id="latinOutput" readonly></textarea>
        </div>
    </div>
    <div class="buttons">
        <button class="btn-transliterate" onclick="transliterate()">Transliterar</button>
        <button class="btn-remove" onclick="removeDiacritics()">Limpiar Diacríticos</button>
    </div>
</div>

<script>
    // Mapeo ajustado para el estilo fonético solicitado
    const map = {
        'ا': 'ā', 'ب': 'b', 'ت': 't̊', 'ث': 'ṯ', 'ج': 'j̊', 'ح': 'ḥ', 'خ': 'ḫ',
        'د': 'd', 'ذ': 'ḏ', 'ر': 'r', 'ز': 'z', 'س': 's', 'ش': 'š', 'ص': 'ṣ',
        'ض': 'ḍ', 'ط': '', 'ظ': 'ẓ', 'ع': 'ʿ', 'غ': 'ġ', 'ف': 'f̊', 'ق': 'q̊',
        'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n', 'ه': 'h', 'و': 'w', 'ي': 'y',
        'ء': 'ʾ', 'آ': 'ʾā', 'أ': 'ʾa', 'إ': 'ʾi', 'ؤ': 'ʾu', 'ئ': 'ʾi',
        'ة': 'ah', 'ى': 'ā',
        'َ': 'ạ', 'ُ': 'u', 'ِ': 'i', 'ً': 'ã', 'ٌ': 'ũ', 'ٍ': 'ĩ',
        'ّ': '', 'ْ': '', ' ': ' ', '\n': '\n'
    };

    function transliterate() {
        const input = document.getElementById('arabicInput').value;
        if (!input.trim()) return;
        
        let output = '';
        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            if (map[char] !== undefined) {
                if (char === 'ّ' && output.length > 0) {
                    output += output.slice(-1); // Duplica la consonante anterior
                } else {
                    output += map[char];
                }
            } else {
                output += char;
            }
        }
        document.getElementById('latinOutput').value = output;
    }

    function removeDiacritics() {
        const input = document.getElementById('arabicInput').value;
        document.getElementById('arabicInput').value = input.replace(/[\u064B-\u0652]/g, '');
    }
</script>
</body>
</html>
