<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Árabe → IPA → Español</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0c10;
      color: #f8f8ff;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    h2 {
      margin-top: 2rem;
    }

    .card {
      background: #151720;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border: 1px solid #3b3f5c;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    textarea, input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #3b3f5c;
      padding: 0.75rem;
      font-size: 1rem;
      background: #0f1118;
      color: #f8f8ff;
      resize: vertical;
    }

    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #8a2be2, #ff6bd5);
      color: #fff;
      box-shadow: 0 0 12px rgba(255, 107, 213, 0.5);
    }

    button:hover {
      filter: brightness(1.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
      font-size: 0.95rem;
    }

    th, td {
      padding: 0.6rem 0.4rem;
      border-bottom: 1px solid #2b2f45;
      text-align: left;
    }

    th {
      background: #1f2230;
      position: sticky;
      top: 0;
    }

    .phoneme {
      font-weight: 700;
      color: #ffb3ff;
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
    }

    .hint {
      font-size: 0.85rem;
      color: #c0c0ff;
      margin-top: 0.5rem;
    }

    .example {
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      color: #ffd6ff;
    }

    .ipa-output {
      margin-top: 0.8rem;
      font-family: "Courier New", monospace;
      font-size: 1rem;
      color: #ffb3ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Árabe → IPA → Español</h1>
    <p style="text-align:center;">Escribe una frase en árabe y mira su IPA con comparación a sonidos del español.</p>

    <div class="card">
      <label for="arabicInput">Frase en árabe:</label>
      <input id="arabicInput" dir="rtl" placeholder="اكتب في الدفتر">
      <div class="hint">
        Ejemplo: <span class="example">اكتب في الدفتر</span>
      </div>
      <button onclick="convertArabicToIPA()">Convertir a IPA y analizar</button>

      <div id="ipaResult" class="ipa-output"></div>
    </div>

    <h2>Comparación fonema por fonema</h2>
    <div id="result"></div>

    <div class="footer">
      Herramienta casera de fonética ✨<br>
      Súbela a GitHub Pages y úsala como tu laboratorio de árabe.
    </div>
  </div>

  <script>
    // Mapa muy simplificado de letras árabes → fonemas IPA (solo tus fonemas)
    // OJO: es aproximado y limitado, pensado para practicar, no para uso académico estricto.
    const arabicToIPA = {
      "ا": "ʔa",   // inicio de vocal
      "أ": "ʔa",
      "إ": "ʔi",
      "آ": "ʔa",
      "ء": "ʔ",
      "ب": "b",
      "ت": "t",
      "ث": "θ",
      "ج": "j",
      "ح": "h",
      "خ": "h",   // usando h para fricativa fuerte
      "د": "d",
      "ذ": "ð",
      "ر": "r",
      "ز": "z",
      "س": "sˤ",  // usando tu sˤ como s general
      "ش": "ʃ",
      "ص": "sˤ",
      "ض": "ðˤ",
      "ط": "t",
      "ظ": "ðˤ",
      "ع": "ʕ",
      "غ": "ʕ",   // aproximación
      "ف": "f",
      "ق": "q",
      "ك": "k",
      "ل": "l",   // no está en tu inventario, lo marcamos aparte
      "م": "m",
      "ن": "n",
      "ه": "h",
      "و": "w",
      "ي": "j",
      "ى": "a",
      "َ": "a",
      "ِ": "i",
      "ُ": "u",
      "ْ": "",
      "ّ": ""     // no tratamos geminación aquí
    };

    // Diccionario de fonemas → aproximación en español
    const phonemeMap = {
      "a": {
        ejemplo: "a de «casa»",
        desc: "Vocal abierta, muy similar a la a española."
      },
      "u": {
        ejemplo: "u de «luna»",
        desc: "Vocal cerrada posterior, igual que la u española."
      },
      "i": {
        ejemplo: "i de «vino»",
        desc: "Vocal cerrada anterior, igual que la i española."
      },
      "iː": {
        ejemplo: "i larga",
        desc: "Como la i de «vino» pero sostenida más tiempo."
      },
      "b": {
        ejemplo: "b de «barco»",
        desc: "Oclusiva sonora, similar a la b española en posición fuerte."
      },
      "t": {
        ejemplo: "t de «taco»",
        desc: "Oclusiva sorda, más seca que la t española."
      },
      "d": {
        ejemplo: "d de «dado»",
        desc: "Oclusiva sonora, más limpia que la d fricativa de «cada»."
      },
      "m": {
        ejemplo: "m de «mano»",
        desc: "Nasal bilabial, igual que en español."
      },
      "n": {
        ejemplo: "n de «noche»",
        desc: "Nasal alveolar, igual que en español."
      },
      "f": {
        ejemplo: "f de «foca»",
        desc: "Fricativa labiodental sorda, igual que en español."
      },
      "k": {
        ejemplo: "c de «casa»",
        desc: "Oclusiva velar sorda, igual que la k/c española."
      },
      "r": {
        ejemplo: "r suave de «pero»",
        desc: "Vibrante simple, como la r entre vocales en español."
      },
      "w": {
        ejemplo: "u semiconsonante de «hueso»",
        desc: "Aproximante labiovelar, similar a la u en diptongos."
      },
      "j": {
        ejemplo: "y de «yo»",
        desc: "Aproximante palatal, similar a la y española."
      },
      "z": {
        ejemplo: "z de «zapato» (España)",
        desc: "Fricativa interdental sonora; en Latinoamérica se parece a una s sonora."
      },
      "θ": {
        ejemplo: "z de «zapato» (España)",
        desc: "Fricativa interdental sorda; no existe en la mayoría del español latino."
      },
      "ð": {
        ejemplo: "d suave de «cada»",
        desc: "Fricativa dental sonora, como la d floja entre vocales."
      },
      "ʃ": {
        ejemplo: "sh de «shampoo»",
        desc: "Fricativa postalveolar sorda; aparece en préstamos en español."
      },
      "ʔ": {
        ejemplo: "corte en «¡eh!»",
        desc: "Oclusiva glotal; pequeño golpe de cierre en la garganta."
      },
      "ʕ": {
        ejemplo: "no existe en español",
        desc: "Aproximante faríngea sonora; sonido gutural profundo."
      },
      "q": {
        ejemplo: "k muy profunda",
        desc: "Oclusiva uvular sorda; como una k hecha más atrás."
      },
      "h": {
        ejemplo: "j suave de «México»",
        desc: "Fricativa glotal sorda; similar a una j suave latinoamericana."
      },
      "sˤ": {
        ejemplo: "s enfática",
        desc: "S alveolar enfática; más oscura y profunda."
      },
      "ðˤ": {
        ejemplo: "d suave enfática",
        desc: "Versión enfática de ð; más profunda."
      },
      "l": {
        ejemplo: "l de «luna»",
        desc: "No estaba en tu tabla original, pero la mostramos para que no se pierda."
      }
    };

    function arabicToIPAString(text) {
      let ipa = "";
      for (const ch of text) {
        if (arabicToIPA[ch] !== undefined) {
          ipa += arabicToIPA[ch];
        } else if (ch === " " || ch === "\t" || ch === "\n") {
          ipa += " ";
        } else {
          // carácter desconocido
          ipa += "?";
        }
      }
      return ipa.trim();
    }

    function tokenizeIPA(input) {
      const phonemes = [
        "iː", "sˤ", "ðˤ",
        "ʔ", "ʕ", "θ", "ð", "ʃ",
        "a", "u", "b", "t", "m", "d", "f",
        "j", "n", "i", "q", "h", "z", "w", "r", "k", "l"
      ];

      const tokens = [];
      let i = 0;

      while (i < input.length) {
        const ch = input[i];
        if (ch === " " || ch === "/" || ch === "|" || ch === "\n" || ch === "\t") {
          i++;
          continue;
        }

        let matched = null;
        for (const ph of phonemes) {
          if (input.startsWith(ph, i)) {
            matched = ph;
            break;
          }
        }

        if (matched) {
          tokens.push(matched);
          i += matched.length;
        } else {
          tokens.push(input[i]);
          i++;
        }
      }

      return tokens;
    }

    function convertArabicToIPA() {
      const arabic = document.getElementById("arabicInput").value.trim();
      const ipaDiv = document.getElementById("ipaResult");
      const resultDiv = document.getElementById("result");

      if (!arabic) {
        ipaDiv.innerHTML = "Escribe una frase en árabe para convertirla 🪄";
        resultDiv.innerHTML = "";
        return;
      }

      const ipa = arabicToIPAString(arabic);
      ipaDiv.innerHTML = `IPA aproximada (con tus fonemas): <span class="example">/${ipa}/</span>`;

      const tokens = tokenizeIPA(ipa);

      let html = "<table><thead><tr><th>Fonema</th><th>Ejemplo en español</th><th>Descripción</th></tr></thead><tbody>";

      tokens.forEach(token => {
        if (phonemeMap[token]) {
          html += `<tr>
            <td class="phoneme">${token}</td>
            <td>${phonemeMap[token].ejemplo}</td>
            <td>${phonemeMap[token].desc}</td>
          </tr>`;
        } else {
          html += `<tr>
            <td class="phoneme">${token}</td>
            <td>—</td>
            <td>Este símbolo no está en tu inventario definido.</td>
          </tr>`;
        }
      });

      html += "</tbody></table>";
      resultDiv.innerHTML = html;
    }
  </script>
</body>
</html>
